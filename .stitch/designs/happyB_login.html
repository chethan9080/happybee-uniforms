<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>happyB - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#fbfaee",
              "secondary-fixed-dim": "#c8c6c6",
              "error": "#ba1a1a",
              "background": "#fbfaee",
              "on-surface-variant": "#4e4632",
              "surface-tint": "#755b00",
              "primary": "#755b00",
              "inverse-on-surface": "#f2f1e5",
              "on-primary-container": "#685100",
              "surface-variant": "#e4e3d7",
              "on-primary-fixed": "#241a00",
              "on-tertiary-container": "#005c70",
              "primary-container": "#f5c200",
              "secondary-fixed": "#e4e2e1",
              "surface-container": "#efeee3",
              "secondary": "#5f5e5e",
              "tertiary-fixed": "#b3ebff",
              "on-secondary-fixed-variant": "#474747",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "on-primary": "#ffffff",
              "on-secondary-container": "#656464",
              "tertiary": "#00677d",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#001f27",
              "surface-container-lowest": "#ffffff",
              "outline": "#807660",
              "surface-container-high": "#e9e9dd",
              "surface": "#fbfaee",
              "primary-fixed-dim": "#f3c000",
              "on-tertiary-fixed-variant": "#004e5f",
              "primary-fixed": "#ffe08f",
              "on-primary-fixed-variant": "#584400",
              "inverse-primary": "#f3c000",
              "tertiary-container": "#49d9ff",
              "secondary-container": "#e4e2e1",
              "surface-container-highest": "#e4e3d7",
              "surface-container-low": "#f5f4e8",
              "on-surface": "#1b1c15",
              "tertiary-fixed-dim": "#45d7fc",
              "on-background": "#1b1c15",
              "outline-variant": "#d2c5ab",
              "inverse-surface": "#303129",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "surface-dim": "#dbdbcf",
              "on-secondary-fixed": "#1b1c1c"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .honeycomb-pattern {
        background-color: #fbfaee;
        background-image: radial-gradient(#f5c200 0.5px, transparent 0.5px), radial-gradient(#f5c200 0.5px, #fbfaee 0.5px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        opacity: 0.1;
      }
      .honeycomb-mask {
        mask-image: radial-gradient(circle at center, black, transparent 80%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Suppressed Shell: BottomNavBar/TopAppBar excluded for focused login flow -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute inset-0 honeycomb-pattern honeycomb-mask pointer-events-none"></div>
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container rounded-full opacity-20 blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-tertiary-container rounded-full opacity-10 blur-3xl"></div>
<div class="w-full max-w-md z-10">
<!-- Brand Header -->
<div class="text-center mb-12 space-y-4">
<div class="inline-flex items-center justify-center gap-1">
<span class="font-headline font-black text-5xl tracking-tighter text-on-surface">h</span>
<span class="font-headline font-black text-5xl tracking-tighter text-on-surface">a</span>
<!-- Googly eye 'p's -->
<div class="relative w-10 h-12 flex items-center justify-center">
<span class="font-headline font-black text-5xl tracking-tighter text-on-surface absolute inset-0">p</span>
<div class="absolute top-[14px] left-[10px] w-3 h-3 bg-white rounded-full border border-on-surface">
<div class="w-1.5 h-1.5 bg-on-surface rounded-full m-0.5"></div>
</div>
</div>
<div class="relative w-10 h-12 flex items-center justify-center">
<span class="font-headline font-black text-5xl tracking-tighter text-on-surface absolute inset-0">p</span>
<div class="absolute top-[14px] left-[10px] w-3 h-3 bg-white rounded-full border border-on-surface">
<div class="w-1.5 h-1.5 bg-on-surface rounded-full m-0.5"></div>
</div>
</div>
<span class="font-headline font-black text-5xl tracking-tighter text-on-surface">y</span>
<!-- Cartoon Bee 'B' -->
<div class="relative ml-1">
<span class="font-headline font-black text-6xl text-primary leading-none">B</span>
<div class="absolute -top-4 -right-2 transform rotate-12">
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">pest_control</span>
</div>
</div>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_32px_64px_-12px_rgba(27,28,21,0.06)] border border-outline-variant/10">
<div class="mb-8">
<h1 class="font-headline font-bold text-2xl text-on-surface mb-2">Welcome back! 🐝</h1>
<p class="text-on-surface-variant font-medium">Ready for another busy day of play?</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="font-headline font-semibold text-sm ml-4 text-on-surface" for="email">Email</label>
<input class="w-full h-14 px-6 rounded-full bg-surface-container-low border-none ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-on-surface-variant/50 transition-all outline-none" id="email" placeholder="hello@happyb.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-4">
<label class="font-headline font-semibold text-sm text-on-surface" for="password">Password</label>
</div>
<input class="w-full h-14 px-6 rounded-full bg-surface-container-low border-none ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-primary-container text-on-surface placeholder:text-on-surface-variant/50 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-bold text-lg rounded-full shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 mt-4" type="submit">
                        Login
                    </button>
</form>
<div class="mt-8 pt-6 border-t border-surface-container space-y-4 text-center">
<a class="block text-sm font-semibold text-secondary hover:text-on-surface transition-colors" href="#">Forgot password?</a>
<p class="text-sm text-on-surface-variant">
                        New to the hive? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Trust Badges / Social -->
<div class="mt-12 flex justify-center items-center gap-8 opacity-40 grayscale hover:grayscale-0 transition-all">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">shield_person</span>
<span class="text-xs font-bold uppercase tracking-widest">Safe &amp; Secure</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-xl">verified_user</span>
<span class="text-xs font-bold uppercase tracking-widest">Parent Verified</span>
</div>
</div>
</div>
</main>
<!-- Simple Footer (Legal focus) -->
<footer class="bg-surface-container-low py-8 px-6 text-center">
<p class="font-body text-sm text-on-surface-variant mb-4">© 2024 happyB. Built for little bees.</p>
<div class="flex flex-wrap justify-center gap-6 text-xs font-bold text-secondary uppercase tracking-wider">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Safety</a>
<a class="hover:text-primary transition-colors" href="#">Parents</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</body></html>
